name: ci

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (avoids duplicate push+PR work).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · test (race)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Several test fixtures shell out to `git commit` / `--amend`, which
      # need a committer identity the bare runner doesn't have.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@bucketvcs.invalid"
          git config --global user.name "bucketvcs CI"

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

  cross-build:
    name: cross-build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Pure-Go (no cgo): every target cross-compiles from this one runner.
      # Build-only — catches platform breakage early, before a release tag.
      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./cmd/bucketvcs

  # Per-commit Postgres metadata-backend conformance (M23 B1). The default
  # `go test ./...` above covers SQLite (the default backend); this job runs the
  # //go:build postgres suite against a real postgres:17 so a PR that breaks the
  # Postgres backend fails here, not only in the nightly conformance workflow.
  # (libSQL conformance stays nightly-only — it needs the sqld container.)
  postgres-conformance:
    name: postgres conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: bv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Postgres conformance
        env:
          BUCKETVCS_POSTGRES_URL: "postgres://postgres@127.0.0.1:5432/bv?sslmode=disable"
          BUCKETVCS_DB_AUTH_TOKEN: "pw"
        run: go test -tags postgres -count=1 ./internal/auth/sqlitestore/ -run TestPostgresConformance -v

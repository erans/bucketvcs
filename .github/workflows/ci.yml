name: ci

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (avoids duplicate push+PR work).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · test (race)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      # Several test fixtures shell out to `git commit` / `--amend`, which
      # need a committer identity the bare runner doesn't have.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@bucketvcs.invalid"
          git config --global user.name "bucketvcs CI"

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

  # Dependency-license guard. Fails if any module linked into ./cmd/bucketvcs
  # carries a non-permissive (or missing/unrecognized) license, or if NOTICE /
  # THIRD_PARTY_LICENSES have drifted from a fresh regeneration. bucketvcs ships
  # Apache-2.0, so every linked dependency must be permissive (Apache-2.0, BSD,
  # MIT, ISC) and its attribution reproduced. Run scripts/license-check.sh
  # generate after changing dependencies.
  license-check:
    name: license check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Check dependency licenses + NOTICE/THIRD_PARTY_LICENSES freshness
        run: ./scripts/license-check.sh check

  cross-build:
    name: cross-build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      # Pure-Go (no cgo): every target cross-compiles from this one runner.
      # Build-only — catches platform breakage early, before a release tag.
      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./cmd/bucketvcs

  # Per-commit Postgres metadata-backend conformance (M23 B1+B2). The default
  # `go test ./...` above covers SQLite (the default backend); this job runs the
  # //go:build postgres suite against a real Postgres (matrix: 14 floor + 18
  # latest) so a PR that breaks the Postgres backend fails here, not only in the
  # nightly conformance workflow. (libSQL has its own per-commit job below.)
  postgres-conformance:
    name: postgres conformance (pg${{ matrix.pg }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: bv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Postgres conformance
        env:
          BUCKETVCS_POSTGRES_URL: "postgres://postgres@127.0.0.1:5432/bv?sslmode=disable"
          BUCKETVCS_DB_AUTH_TOKEN: "pw"
        run: go test -tags postgres -count=1 ./internal/auth/sqlitestore/ -run TestPostgresConformance -v

  # Per-commit libSQL/Turso metadata-backend conformance (M23 Phase A). Mirrors
  # the postgres job above with an sqld service container; runs the //go:build
  # libsql suite so a PR breaking the libSQL backend fails in ci.yml, not only in
  # the nightly conformance workflow. sqld's user HTTP API listens on port 8080.
  libsql-conformance:
    name: libsql conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      sqld:
        image: ghcr.io/tursodatabase/libsql-server:v0.24.33
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Wait for sqld
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "sqld up"; exit 0
            fi
            sleep 1
          done
          echo "sqld did not become ready"; exit 1
      - name: libSQL conformance
        env:
          BUCKETVCS_LIBSQL_URL: "http://127.0.0.1:8080"
        run: go test -tags libsql -count=1 ./internal/auth/sqlitestore/ -run TestLibsqlConformance -v

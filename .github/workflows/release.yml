name: release

on:
  push:
    tags:
      - 'v*'   # semver release tags only (v0.1.0, v1.2.3). Milestone tags (mNN-*) are ignored.

jobs:
  test:
    name: test gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go test -count=1 ./...

  release:
    name: build + publish
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Pure-Go (CGO_ENABLED=0): all five targets cross-compile from this
      # single Linux runner. The tag is stamped into buildVersion via -ldflags.
      - name: Build, package, checksum
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ldflags="-s -w -X main.buildVersion=${VERSION}"
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          mkdir -p dist
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            bin="bucketvcs"; [ "$os" = "windows" ] && bin="bucketvcs.exe"
            stage="stage/${os}_${arch}"
            mkdir -p "$stage"
            echo "==> building ${os}/${arch}"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "$ldflags" -o "$stage/$bin" ./cmd/bucketvcs
            cp README.md "$stage/" 2>/dev/null || true
            base="bucketvcs_${VERSION}_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              (cd "$stage" && zip -q -r "${GITHUB_WORKSPACE}/dist/${base}.zip" .)
            else
              tar -C "$stage" -czf "dist/${base}.tar.gz" .
            fi
          done
          (cd dist && sha256sum * > SHA256SUMS.txt)
          echo "==> artifacts:"; ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

name: conformance

on:
  # Emulator + real-cloud conformance are heavyweight, so they run nightly and
  # on demand — NOT per-commit — to keep per-commit checks fast and green.
  # Lighter per-push storage coverage lives in the conformance-cloud workflow,
  # and the full Go suite runs per-commit in ci.yml.
  schedule:
    - cron: "17 6 * * *"  # nightly emulator + real-cloud run
  workflow_dispatch:

jobs:
  emulators:
    name: emulators (MinIO + fake-gcs + Azurite)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Run conformance against emulators
        run: ./scripts/conformance-emulators.sh

  real-cloud:
    name: real-cloud (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The `secrets` context cannot be referenced in a step `if:` — doing so is a
    # workflow-validation error that fails the entire file to start (taking the
    # push-triggered emulators job down with it). Map the gating secrets to
    # job-level env and gate the steps on env instead.
    env:
      HAS_S3: ${{ secrets.AWS_S3_BUCKET }}
      HAS_R2: ${{ secrets.R2_BUCKET }}
      HAS_GCS: ${{ secrets.GCS_BUCKET }}
      HAS_AZURE: ${{ secrets.AZURE_CONTAINER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: AWS S3 conformance
        if: ${{ env.HAS_S3 != '' }}
        env:
          BUCKETVCS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          BUCKETVCS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
        run: go test -count=1 -timeout=15m ./internal/storage/s3compat

      - name: Cloudflare R2 conformance
        if: ${{ env.HAS_R2 != '' }}
        env:
          BUCKETVCS_R2_BUCKET: ${{ secrets.R2_BUCKET }}
          BUCKETVCS_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BUCKETVCS_R2_REGION: auto
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: go test -count=1 -timeout=15m ./internal/storage/s3compat

      - name: GCS conformance
        if: ${{ env.HAS_GCS != '' }}
        env:
          BUCKETVCS_GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcs-creds.json
        run: |
          echo '${{ secrets.GCS_CREDENTIALS_JSON }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          go test -count=1 -timeout=15m ./internal/storage/gcs

      - name: Azure Blob conformance
        if: ${{ env.HAS_AZURE != '' }}
        env:
          BUCKETVCS_AZURE_CONTAINER: ${{ secrets.AZURE_CONTAINER }}
          BUCKETVCS_AZURE_ACCOUNT: ${{ secrets.AZURE_ACCOUNT }}
          BUCKETVCS_AZURE_ACCOUNT_KEY: ${{ secrets.AZURE_ACCOUNT_KEY }}
        run: go test -count=1 -timeout=15m ./internal/storage/azureblob

  libsql:
    name: libsql (sqld) conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Pinned to a verified-working tag (v0.24.33 served GET /health=200, the
      # Hrana /v2/pipeline API, and passed the gated suite locally). sqld's user
      # HTTP API listens on container port 8080.
      sqld:
        image: ghcr.io/tursodatabase/libsql-server:v0.24.33
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Wait for sqld
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "sqld up"; exit 0
            fi
            sleep 1
          done
          echo "sqld did not become ready"; exit 1
      - name: libSQL conformance
        env:
          BUCKETVCS_LIBSQL_URL: "http://127.0.0.1:8080"
        run: go test -tags libsql -count=1 ./internal/auth/sqlitestore/ -run TestLibsqlConformance -v

  postgres:
    name: postgres conformance (pg${{ matrix.pg }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: bv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Postgres conformance
        env:
          BUCKETVCS_POSTGRES_URL: "postgres://postgres@127.0.0.1:5432/bv?sslmode=disable"
          BUCKETVCS_DB_AUTH_TOKEN: "pw"
        run: go test -tags postgres -count=1 ./internal/auth/sqlitestore/ -run TestPostgresConformance -v

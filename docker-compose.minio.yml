services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: bucketvcs-minio
    runtime: runc
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  createbucket:
    image: quay.io/minio/mc:latest
    container_name: bucketvcs-mc-init
    runtime: runc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin123 >/dev/null 2>&1; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb -p local/bucketvcs && echo 'bucket bucketvcs created (or already existed)';
      mc anonymous set none local/bucketvcs;
      "
    restart: "no"

volumes:
  minio-data:
